<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diffie-Hellman · Η Αποστολή του Κοινού Μυστικού</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.4/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0618;
    --bg-mid: #16102e;
    --bg-soft: #221848;
    --gold: #e6b85c;
    --gold-soft: #d4a574;
    --player: #6dd3fc;
    --player-soft: #38bdf8;
    --ed: #ef4444;
    --ed-soft: #f87171;
    --parchment: #f0e6d2;
    --muted: #9b8fb5;
    --emerald: #6ee7b7;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    background:
      radial-gradient(ellipse at top, rgba(140, 90, 220, 0.18), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(230, 184, 92, 0.08), transparent 60%),
      linear-gradient(135deg, #0a0618 0%, #16102e 50%, #221848 100%);
    background-attachment: fixed;
    min-height: 100vh;
    color: var(--parchment);
    overflow-x: hidden;
  }
  .font-display { font-family: 'Cormorant Garamond', serif; letter-spacing: 0.02em; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    z-index: 1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  .glow-gold { text-shadow: 0 0 24px rgba(230, 184, 92, 0.5); }
  .glow-player { text-shadow: 0 0 18px rgba(109, 211, 252, 0.5); }
  .glow-ed { text-shadow: 0 0 18px rgba(239, 68, 68, 0.5); }

  @keyframes float-soft {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .animate-float { animation: float-soft 4s ease-in-out infinite; }

  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(230, 184, 92, 0.5); }
    70% { box-shadow: 0 0 0 18px rgba(230, 184, 92, 0); }
    100% { box-shadow: 0 0 0 0 rgba(230, 184, 92, 0); }
  }
  .pulse-gold { animation: pulse-ring 2s infinite; }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fade-up 0.5s ease-out forwards; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.4s; }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .shimmer-text {
    background: linear-gradient(90deg, var(--gold) 0%, #fff5d6 50%, var(--gold) 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 4s linear infinite;
  }

  @keyframes spin-slow { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  .spin-slow { animation: spin-slow 20s linear infinite; transform-origin: center; }

  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: rgba(230, 184, 92, 0.3); border-radius: 4px; }

  .speech-bubble {
    position: relative;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(230, 184, 92, 0.2);
    border-radius: 14px;
    padding: 14px 18px;
  }
  .speech-bubble.ed { border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.06); }
  .speech-bubble.player { border-color: rgba(109, 211, 252, 0.3); background: rgba(109, 211, 252, 0.06); }

  input.game-input {
    background: rgba(255, 255, 255, 0.05);
    border: 2px solid rgba(230, 184, 92, 0.4);
    color: var(--parchment);
    border-radius: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem;
    text-align: center;
    width: 120px;
    padding: 10px;
    transition: all 0.2s;
  }
  input.game-input:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(230, 184, 92, 0.15);
  }
  input.game-input.small { width: 80px; font-size: 1.2rem; padding: 8px; }

  button.game-btn {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-soft) 100%);
    color: #1a0f2e;
    font-weight: 700;
    padding: 12px 28px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-size: 0.875rem;
    transition: all 0.2s;
    box-shadow: 0 4px 20px -6px rgba(230, 184, 92, 0.5);
  }
  button.game-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px -6px rgba(230, 184, 92, 0.7); }
  button.game-btn:active { transform: translateY(0); }
  button.game-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  button.game-btn-ghost {
    background: transparent;
    color: var(--parchment);
    border: 1.5px solid rgba(230, 184, 92, 0.4);
    padding: 10px 24px;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-size: 0.8rem;
    transition: all 0.2s;
  }
  button.game-btn-ghost:hover { background: rgba(230, 184, 92, 0.1); border-color: var(--gold); }

  .number-box {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 80px;
    height: 56px;
    padding: 0 18px;
    border-radius: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.75rem;
    font-weight: 700;
    border: 2px solid;
    transition: all 0.3s;
  }
  .number-box.small { min-width: 60px; height: 44px; font-size: 1.25rem; padding: 0 12px; }
  .number-box.empty { color: rgba(255, 255, 255, 0.25); border-style: dashed; }
  .number-box.private { background: rgba(109, 211, 252, 0.1); border-color: rgba(109, 211, 252, 0.4); color: var(--player); }
  .number-box.public { background: rgba(230, 184, 92, 0.1); border-color: rgba(230, 184, 92, 0.5); color: var(--gold); }
  .number-box.hidden-val {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(155, 143, 181, 0.4);
    color: var(--muted);
    cursor: pointer;
  }
  .number-box.hidden-val:hover { border-color: var(--gold); }

  .drag-item {
    background: rgba(255, 255, 255, 0.04);
    border: 1.5px solid rgba(230, 184, 92, 0.3);
    border-radius: 12px;
    padding: 14px 18px;
    margin: 8px 0;
    cursor: grab;
    user-select: none;
    transition: all 0.2s;
  }
  .drag-item:hover { border-color: var(--gold); background: rgba(230, 184, 92, 0.08); }
  .drag-item.dragging { opacity: 0.4; cursor: grabbing; }
  .drag-item.drag-over { border-color: var(--player); border-style: dashed; }

  .building-card { position: relative; cursor: pointer; transition: all 0.4s; }
  .building-card.locked { opacity: 0.25; cursor: not-allowed; filter: grayscale(0.5); }
  .building-card.locked:hover { transform: none; }
  .building-card:hover { transform: translateY(-6px); }
  .building-card.completed { filter: drop-shadow(0 0 20px rgba(230, 184, 92, 0.4)); }

  .ed-tracker {
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 14px;
    padding: 14px 18px;
    backdrop-filter: blur(8px);
  }

  .heart {
    display: inline-block;
    width: 22px; height: 22px;
    color: var(--ed); transition: all 0.3s;
  }
  .heart.lost { color: rgba(255, 255, 255, 0.1); transform: scale(0.85); }

  .fancy-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(230, 184, 92, 0.4), transparent);
    margin: 12px 0;
  }

  .stage-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: 1px solid rgba(230, 184, 92, 0.3);
    color: var(--gold);
    background: rgba(230, 184, 92, 0.05);
  }

  .info-card {
    background: rgba(109, 211, 252, 0.05);
    border: 1px solid rgba(109, 211, 252, 0.2);
    border-radius: 14px;
    padding: 16px 20px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ============================== MATH ============================== */
const modPow = (base, exp, mod) => {
  let result = 1; base = ((base % mod) + mod) % mod;
  while (exp > 0) {
    if (exp % 2 === 1) result = (result * base) % mod;
    exp = Math.floor(exp / 2);
    base = (base * base) % mod;
  }
  return result;
};
const isPrime = (n) => {
  if (n < 2) return false;
  if (n === 2) return true;
  if (n % 2 === 0) return false;
  for (let i = 3; i * i <= n; i += 2) if (n % i === 0) return false;
  return true;
};

/* ============================== ICONS ============================== */
const HeartIcon = ({ filled }) => (
  <svg className={`heart ${filled ? '' : 'lost'}`} viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 21s-7-4.35-7-10a4.5 4.5 0 0 1 8-2.83A4.5 4.5 0 0 1 19 11c0 5.65-7 10-7 10z"/>
  </svg>
);
const LockIcon = (p) => (
  <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
    <rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
  </svg>
);
const CheckIcon = (p) => (
  <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
);
const XIcon = (p) => (
  <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
);
const SearchIcon = (p) => (
  <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
  </svg>
);

/* ============================== HUD ============================== */
const Hud = ({ lives, levelName, sceneTitle, sceneNum, totalScenes }) => (
  <div className="fixed top-0 left-0 right-0 z-30 px-6 py-4 flex items-center justify-between"
       style={{ background: 'linear-gradient(180deg, rgba(10,6,24,0.92) 0%, rgba(10,6,24,0) 100%)', backdropFilter: 'blur(8px)' }}>
    <div className="flex items-center gap-4 flex-wrap">
      <div className="font-display text-xl glow-gold" style={{ color: 'var(--gold)' }}>◆ {levelName}</div>
      {sceneTitle && (
        <>
          <div className="text-white/20 hidden md:block">|</div>
          <div className="flex flex-col">
            <span className="stage-tag">Σκηνή {sceneNum}/{totalScenes}</span>
            <span className="text-sm text-white/70 mt-1">{sceneTitle}</span>
          </div>
        </>
      )}
    </div>
    <div className="flex items-center gap-2">
      <span className="text-xs uppercase tracking-widest text-white/50 mr-2 hidden md:inline">Ζωές</span>
      {[...Array(5)].map((_, i) => <HeartIcon key={i} filled={i < lives} />)}
    </div>
  </div>
);

/* ============================== AVATARS & SPEECH ============================== */
const Avatar = ({ type, active, talking }) => {
  const colors = {
    player:  { fill: '#6dd3fc', glow: 'rgba(109,211,252,0.45)', name: 'ΕΣΥ', sub: 'Παίκτης' },
    master:  { fill: '#e6b85c', glow: 'rgba(230,184,92,0.45)',  name: 'MASTER', sub: 'Δάσκαλος' },
    ed:      { fill: '#ef4444', glow: 'rgba(239,68,68,0.45)',   name: 'ED', sub: 'Υποκλοπέας' },
  }[type];
  return (
    <div className={`flex flex-col items-center transition-all duration-300 ${active ? 'scale-110' : 'opacity-60'}`}>
      <div className="relative" style={{ filter: talking ? `drop-shadow(0 0 14px ${colors.glow})` : 'none' }}>
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle cx="35" cy="28" r="14" fill={colors.fill} opacity="0.25"/>
          <circle cx="35" cy="28" r="11" fill="none" stroke={colors.fill} strokeWidth="2"/>
          <path d="M 18 60 Q 18 44 35 44 Q 52 44 52 60" fill={colors.fill} opacity="0.25"/>
          <path d="M 18 60 Q 18 44 35 44 Q 52 44 52 60" fill="none" stroke={colors.fill} strokeWidth="2"/>
          {type === 'master' && (<><polygon points="28,18 35,8 42,18" fill={colors.fill} opacity="0.6"/><circle cx="35" cy="13" r="2" fill={colors.fill}/></>)}
          {type === 'ed' && (<><path d="M 22 22 L 48 22" stroke={colors.fill} strokeWidth="2"/><rect x="24" y="24" width="8" height="6" rx="2" fill={colors.fill} opacity="0.4"/><rect x="38" y="24" width="8" height="6" rx="2" fill={colors.fill} opacity="0.4"/></>)}
          {type === 'player' && (<circle cx="35" cy="28" r="3" fill={colors.fill}/>)}
        </svg>
        {talking && (<div className="absolute -top-1 -right-1 w-3 h-3 rounded-full animate-pulse" style={{ background: colors.fill }}/>)}
      </div>
      <div className="text-center mt-2">
        <div className="font-display text-sm font-bold tracking-wider" style={{ color: colors.fill }}>{colors.name}</div>
        <div className="text-xs text-white/40">{colors.sub}</div>
      </div>
    </div>
  );
};

const AvatarsRow = ({ active = [], talking = [] }) => (
  <div className="grid grid-cols-3 gap-6 mb-2 max-w-xl mx-auto">
    {['player', 'master', 'ed'].map(t => (
      <Avatar key={t} type={t} active={active.includes(t)} talking={talking.includes(t)}/>
    ))}
  </div>
);

const SpeechBubble = ({ from, children }) => (
  <div className={`speech-bubble ${from} fade-up max-w-3xl mx-auto`}>
    <div className="text-xs uppercase tracking-widest mb-1.5 opacity-70" style={{
      color: from === 'master' ? 'var(--gold)' : from === 'player' ? 'var(--player)' : 'var(--ed-soft)'
    }}>
      {from === 'master' ? 'Master' : from === 'player' ? 'Εσύ' : 'ED (Υποκλοπέας)'} λέει
    </div>
    <div className="text-base text-white/90 leading-relaxed">{children}</div>
  </div>
);

/* ============================== NUMBER BOX ============================== */
const NumberBox = ({ label, value, type, hidden, onPeek, peeked, helper, small }) => {
  const display = hidden && !peeked ? '★ ★ ★' : (value !== null && value !== undefined && value !== '' ? value : '—');
  return (
    <div className="flex flex-col items-center gap-1">
      {label && <div className="text-[0.65rem] uppercase tracking-widest text-white/50 text-center">{label}</div>}
      <div className={`number-box ${small ? 'small' : ''} ${type} ${hidden && !peeked ? 'hidden-val' : ''} ${value === null || value === undefined || value === '' ? 'empty' : ''}`}
           onClick={hidden && !peeked && onPeek ? onPeek : undefined}
           title={hidden && !peeked && onPeek ? 'Κλικ για να δεις τον αριθμό' : ''}>
        {display}
      </div>
      {helper && <div className="text-[0.65rem] text-white/40 italic text-center max-w-[160px]">{helper}</div>}
    </div>
  );
};

/* ============================== ED TRACKER (no time pressure) ============================== */
const EdTracker = ({ attempts, mode }) => (
  <div className="ed-tracker max-w-3xl mx-auto my-4 flex items-center gap-4">
    <div className="flex-shrink-0">
      <SearchIcon className="w-6 h-6 animate-pulse" style={{ color: 'var(--ed-soft)' }}/>
    </div>
    <div className="flex-1">
      <div className="text-xs uppercase tracking-widest mb-1" style={{ color: 'var(--ed-soft)' }}>
        Ο ED δοκιμάζει εξαντλητική αναζήτηση
      </div>
      <div className="text-sm text-white/70">
        {mode === 'idle' && <>Περιμένει να δει τους δημόσιους αριθμούς για να αρχίσει.</>}
        {mode === 'searching' && <>Έχει δοκιμάσει <span className="font-mono font-bold" style={{color:'var(--ed-soft)'}}>{attempts}</span> {attempts === 1 ? 'συνδυασμό' : 'συνδυασμούς'} μέχρι στιγμής.</>}
        {mode === 'found' && <span className="text-emerald-300">Έχει βρει το ταίριασμα — αλλά μόνο επειδή οι αριθμοί είναι μικροί.</span>}
      </div>
    </div>
  </div>
);

/* ============================== START / LEVEL SELECT ============================== */
const StartScreen = ({ onStart }) => (
  <div className="min-h-screen flex flex-col items-center justify-center px-6 relative">
    <div className="text-center max-w-3xl fade-up">
      <div className="stage-tag mb-6">Εκπαιδευτικό Παιχνίδι Κρυπτογραφίας</div>
      <h1 className="font-display text-6xl md:text-8xl font-bold mb-4 leading-none">
        <span className="shimmer-text">Diffie</span>
        <span style={{ color: 'var(--parchment)' }}> · </span>
        <span className="shimmer-text">Hellman</span>
      </h1>
      <div className="font-display italic text-2xl md:text-3xl mb-2" style={{ color: 'var(--gold-soft)' }}>
        Η Αποστολή του Κοινού Μυστικού
      </div>
      <div className="fancy-divider w-32 mx-auto my-8"></div>
      <p className="text-lg text-white/70 mb-12 max-w-xl mx-auto leading-relaxed">
        Στοιχειώδης μύηση στο πρωτόκολλο δημόσιας ανταλλαγής κλειδιού.
        Εσύ, ο Master και ο <span style={{ color: 'var(--ed-soft)' }}>υποκλοπέας ED</span> — δύο πίστες, δύο κόσμοι.
      </p>
      <button onClick={onStart} className="game-btn pulse-gold text-base px-12 py-4">
        ▸ Έναρξη Αποστολής
      </button>
    </div>
    <div className="absolute bottom-6 text-xs text-white/30 tracking-widest uppercase">
      2 Πίστες · 18 Σκηνές · Πάτησε START
    </div>
  </div>
);

const LevelSelectScreen = ({ unlockedLevel, onSelect }) => (
  <div className="min-h-screen flex flex-col items-center justify-center px-6">
    <div className="text-center max-w-4xl fade-up">
      <div className="stage-tag mb-4">Επιλογή Πίστας</div>
      <h2 className="font-display text-5xl font-bold mb-3">Επίλεξε Επίπεδο</h2>
      <p className="text-white/60 mb-12">Κάθε πίστα ξεκινά με 5 ζωές.</p>
      <div className="grid md:grid-cols-2 gap-6">
        <button onClick={() => onSelect(1)}
                className="text-left p-6 rounded-2xl border-2 transition-all hover:transform hover:-translate-y-1"
                style={{ borderColor: 'rgba(230,184,92,0.5)', background: 'rgba(230,184,92,0.08)' }}>
          <div className="text-xs uppercase tracking-widest mb-2" style={{ color: 'var(--gold)' }}>Πίστα 1</div>
          <div className="font-display text-2xl font-bold mb-2">Κανείς δεν ξέρει διαίρεση</div>
          <p className="text-sm text-white/60 mb-3">Απλοποιημένη εκδοχή με πολλαπλασιασμό. 2 κτήρια, 8 σκηνές.</p>
          <span className="text-sm" style={{ color: 'var(--gold)' }}>▸ Είσοδος</span>
        </button>
        <button onClick={() => unlockedLevel >= 2 && onSelect(2)}
                disabled={unlockedLevel < 2}
                className="text-left p-6 rounded-2xl border-2 transition-all"
                style={{
                  borderColor: unlockedLevel >= 2 ? 'rgba(110,231,183,0.5)' : 'rgba(155,143,181,0.3)',
                  background: unlockedLevel >= 2 ? 'rgba(110,231,183,0.08)' : 'rgba(155,143,181,0.05)',
                  opacity: unlockedLevel >= 2 ? 1 : 0.5,
                  cursor: unlockedLevel >= 2 ? 'pointer' : 'not-allowed',
                }}>
          <div className="text-xs uppercase tracking-widest mb-2" style={{ color: unlockedLevel >= 2 ? 'var(--emerald)' : 'var(--muted)' }}>Πίστα 2</div>
          <div className="font-display text-2xl font-bold mb-2 flex items-center gap-2">
            Πλέον ξέρουν όλοι διαίρεση
            {unlockedLevel < 2 && <LockIcon className="w-5 h-5"/>}
          </div>
          <p className="text-sm text-white/60 mb-3">Αριθμητική Ρολογιού + Ύψωση σε Δύναμη. 2 κτήρια, 10 σκηνές.</p>
          {unlockedLevel >= 2 ? <span className="text-sm" style={{ color: 'var(--emerald)' }}>▸ Είσοδος</span>
                              : <span className="text-sm text-white/40">Ολοκλήρωσε πρώτα την Πίστα 1</span>}
        </button>
      </div>
    </div>
  </div>
);

/* ============================== MAP ============================== */
const Building = ({ x, y, label, locked, completed, onClick }) => (

      <defs>
        <linearGradient id={`bg-${label}`} x1="0" y1="0" x2="0" y2="1">

          <stop offset="100%" stopColor={completed ? "#a07c2a" : "#1a0f2e"}/>

      <polygon points="60,5 10,40 110,40" fill={completed ? "#e6b85c" : "#4a3678"} stroke={completed ? "#fff5d6" : "#6b4ea0"} strokeWidth="2"/>

      <line x1="28" y1="62" x2="42" y2="62" stroke={completed ? "#e6b85c" : "#6b4ea0"} strokeWidth="1"/>

/* ============================== MULTIPLE CHOICE TEST ============================== */
const MultipleChoiceTest = ({ question, options, correctIndex, onPass, onFail }) => {
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const handleSelect = (i) => {
    if (answered) return;
    setSelected(i); setAnswered(true);
    setTimeout(() => i === correctIndex ? onPass() : onFail(), 1100);
  };
  return (
    <div className="min-h-screen pt-24 pb-12 px-6 flex items-center justify-center">
      <div className="max-w-2xl w-full fade-up">
        <div className="text-center mb-6">
          <div className="stage-tag mb-3" style={{ borderColor: 'rgba(239,68,68,0.4)', color: 'var(--ed-soft)' }}>⚠ Test ανάκλησης</div>
          <h2 className="font-display text-3xl md:text-4xl font-bold mb-3">Σκέψου Προσεκτικά</h2>
          <p className="text-white/70">{question}</p>
        </div>
        <div className="space-y-3">
          {options.map((opt, i) => {
            const isCorrect = answered && i === correctIndex;
            const isWrong = answered && i === selected && i !== correctIndex;
            return (
              <button key={i} onClick={() => handleSelect(i)} disabled={answered}
                      className={`w-full text-left p-4 rounded-xl border-2 transition-all flex items-center gap-3
                        ${isCorrect ? 'border-emerald-400 bg-emerald-400/10' :
                          isWrong ? 'border-red-400 bg-red-400/10 shake' :
                          selected === i ? 'border-amber-400 bg-amber-400/10' :
                          'border-white/15 bg-white/5 hover:border-amber-400/60 hover:bg-amber-400/5'}`}
                      style={{ cursor: answered ? 'default' : 'pointer' }}>
                <span className="font-mono text-xs px-2 py-1 rounded bg-white/10">{String.fromCharCode(65 + i)}</span>
                <span className="flex-1">{opt}</span>
                {isCorrect && <CheckIcon className="w-5 h-5 text-emerald-400"/>}
                {isWrong && <XIcon className="w-5 h-5 text-red-400"/>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
};

/* ============================== DRAG & DROP TEST ============================== */
const DragDropTest = ({ correctOrder, title, instructions, onPass, onFail }) => {
  const [items, setItems] = useState(() => {
    const shuffled = [...correctOrder];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    // Make sure not already correct
    if (shuffled.every((v, i) => v === correctOrder[i])) {
      [shuffled[0], shuffled[1]] = [shuffled[1], shuffled[0]];
    }
    return shuffled;
  });
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const [correct, setCorrect] = useState(false);

  const submit = () => {
    const ok = items.every((v, i) => v === correctOrder[i]);
    setCorrect(ok); setSubmitted(true);
    setTimeout(() => ok ? onPass() : onFail(), 1400);
  };

  return (
    <div className="min-h-screen pt-24 pb-12 px-6 flex items-center justify-center">
      <div className="max-w-2xl w-full fade-up">
        <div className="text-center mb-6">
          <div className="stage-tag mb-3">Test Σειράς Βημάτων</div>
          <h2 className="font-display text-3xl md:text-4xl font-bold mb-3">{title}</h2>
          <p className="text-white/70">{instructions}</p>
        </div>
        <div>
          {items.map((item, i) => (
            <div key={item}
                 draggable={!submitted}
                 onDragStart={() => setDragIdx(i)}
                 onDragOver={(e) => { e.preventDefault(); setOverIdx(i); }}
                 onDrop={() => {
                   if (dragIdx === null || dragIdx === i) { setDragIdx(null); setOverIdx(null); return; }
                   const next = [...items];
                   const [moved] = next.splice(dragIdx, 1);
                   next.splice(i, 0, moved);
                   setItems(next); setDragIdx(null); setOverIdx(null);
                 }}
                 onDragEnd={() => { setDragIdx(null); setOverIdx(null); }}
                 className={`drag-item ${dragIdx === i ? 'dragging' : ''} ${overIdx === i && dragIdx !== i ? 'drag-over' : ''}
                   ${submitted ? (item === correctOrder[i] ? 'border-emerald-400/60 bg-emerald-400/10' : 'border-red-400/60 bg-red-400/10') : ''}`}
                 style={{ cursor: submitted ? 'default' : 'grab' }}>
              <div className="flex items-center gap-4">
                <span className="font-mono text-sm px-2.5 py-1 rounded" style={{ background: 'rgba(230,184,92,0.15)', color: 'var(--gold)' }}>{i + 1}</span>
                <span className="flex-1">{item}</span>
                <span className="text-white/30 text-xl">⋮⋮</span>
              </div>
            </div>
          ))}
        </div>
        <div className="text-center mt-8">
          <button onClick={submit} disabled={submitted} className="game-btn">▸ Επιβεβαίωση</button>
        </div>
        {submitted && (
          <div className={`mt-6 text-center font-display text-2xl ${correct ? 'text-emerald-400' : 'text-red-400'}`}>
            {correct ? '✓ Σωστά!' : '✗ Λάθος σειρά'}
          </div>
        )}
      </div>
    </div>
  );
};


/* ============================== LEVEL 1 — CONSTANTS ============================== */
const L1 = {
  PLAYER_PRIV_MIN: 2, PLAYER_PRIV_MAX: 9,
  PUBLIC_MIN: 3, PUBLIC_MAX: 8,
  MASTER_PRIV_B1: 4, MASTER_PUBLIC_B1: 5,
  MASTER_PRIV_B2: 6,
};

/* ============================== LEVEL 1 — BUILDING A SCENES ============================== */
const L1S1_PickPrivate = ({ state, setState, advance }) => {
  const [input, setInput] = useState(''), [error, setError] = useState(''), [peeked, setPeeked] = useState(false);
  const submit = () => {
    const n = Number(input);
    if (!Number.isInteger(n) || n < L1.PLAYER_PRIV_MIN || n > L1.PLAYER_PRIV_MAX) {
      setError(`Πρέπει να είναι ακέραιος ${L1.PLAYER_PRIV_MIN}–${L1.PLAYER_PRIV_MAX}.`); return;
    }
    setError(''); setState(s => ({ ...s, player: { ...s.player, private: n } }));
    setTimeout(advance, 500);
  };
  return (
    <div className="space-y-6 fade-up">
      <AvatarsRow active={['player','master']} talking={['master']}/>
      <SpeechBubble from="master">
        Καλώς ήρθες! Θα δημιουργήσουμε μαζί έναν <em>Κοινό Μυστικό Αριθμό</em>.
        Διάλεξε έναν <strong style={{ color: 'var(--player)' }}>Ιδιωτικό Αριθμό</strong> από {L1.PLAYER_PRIV_MIN} έως {L1.PLAYER_PRIV_MAX}.
        Δεν θα τον δω ούτε εγώ — μένει δικός σου.
      </SpeechBubble>
      <div className="grid md:grid-cols-2 gap-8 items-center">
        <div className="speech-bubble player">
          <div className="text-xs uppercase tracking-widest mb-2 opacity-70" style={{ color: 'var(--player)' }}>Η σειρά σου</div>
          <div className="flex items-end gap-3 flex-wrap">
            <input className="game-input" type="number" placeholder="?" value={input} onChange={e => setInput(e.target.value)} min={L1.PLAYER_PRIV_MIN} max={L1.PLAYER_PRIV_MAX}/>
            <button className="game-btn" onClick={submit}>Επιλογή</button>
          </div>
          {error && <div className="text-red-400 text-sm mt-3">{error}</div>}
        </div>
        <div className="text-center">
          <NumberBox label="Ιδιωτικός του Master" value={L1.MASTER_PRIV_B1} type="private" hidden onPeek={() => setPeeked(true)} peeked={peeked} helper={peeked ? 'Έκλεψες μια ματιά! 👁' : 'Κλικ για ματιά (μόνο σε Πίστα 1)'}/>
        </div>
      </div>
      <SpeechBubble from="ed">Χμ... Δεν βλέπω κανέναν αριθμό. Αναρωτιέμαι ποιους διάλεξαν...</SpeechBubble>
    </div>
  );
};

const L1S2_MasterPicksPublic = ({ state, advance }) => {
  const [revealed, setRevealed] = useState(false);
  useEffect(() => { const t = setTimeout(() => setRevealed(true), 800); return () => clearTimeout(t); }, []);
  return (
    <div className="space-y-6 fade-up">
      <AvatarsRow active={['player','master','ed']} talking={['master', revealed && 'ed'].filter(Boolean)}/>
      <SpeechBubble from="master">
        Τώρα θα διαλέξω έναν <strong style={{ color: 'var(--gold)' }}>Δημόσιο Αριθμό</strong> που θα τον βλέπουν όλοι —
        ακόμα και ο ED. Είναι το «κοινό σημείο εκκίνησης» μας.

        <NumberBox label="Ιδιωτικός σου" value={state.player.private} type="private"/>
        <div className="text-3xl text-white/30">·</div>
        <NumberBox label="Δημόσιος (από Master)" value={revealed ? L1.MASTER_PUBLIC_B1 : null} type="public" helper={revealed ? '✓ Ορατός σε όλους' : 'Επιλέγει...'}/>
        <div className="text-3xl text-white/30">·</div>
        <NumberBox label="Ιδιωτικός Master" value={null} type="private" hidden peeked={false}/>
      </div>
      {revealed && <SpeechBubble from="ed">Ωραία! Τώρα ξέρω αυτόν τον αριθμό. Θα τον χρησιμοποιήσω σύντομα...</SpeechBubble>}

};

const L1S3_PublicPrivate = ({ state, setState, advance, loseLife }) => {
  const [input, setInput] = useState(''), [error, setError] = useState(''), [shaking, setShaking] = useState(false);
  const correct = state.player.private * L1.MASTER_PUBLIC_B1;
  const submit = () => {
    const n = Number(input);
    if (n === correct) {
      setError('');

      setShaking(true); setError('Λάθος υπολογισμός! Χάνεις μία ζωή...');

    <div className="space-y-6 fade-up">
      <AvatarsRow active={['player','master','ed']} talking={['master']}/>
      <SpeechBubble from="master">
        Τώρα φτιάξε τον <strong style={{ color: 'var(--gold)' }}>Δημόσιο-Ιδιωτικό</strong> σου:
        <span className="font-mono mx-2 px-2 py-0.5 rounded bg-white/10">Ιδιωτικός × Δημόσιος</span>.
        Θα τον δείξουμε σε όλους — αλλά κανείς δεν μπορεί να βγάλει από αυτόν τον δικό σου Ιδιωτικό

      <div className="grid md:grid-cols-2 gap-6 items-center">
        <div className="speech-bubble player">
          <div className="text-xs uppercase tracking-widest mb-2 opacity-70" style={{ color: 'var(--player)' }}>Υπολογισμός</div>
          <div className="flex items-center gap-3 flex-wrap mb-3">

            <span className="text-2xl" style={{ color: 'var(--gold)' }}>×</span>

    </div>

/* ============================== CLOCK VISUAL ============================== */
const ClockFace = ({ size = 200, mod, highlight }) => {
  const radius = size / 2 - 22;
  const cx = size / 2, cy = size / 2;
  const ticks = [];
  for (let i = 0; i < mod; i++) {
    const angle = (i / mod) * 2 * Math.PI - Math.PI / 2;
    const x = cx + radius * Math.cos(angle);
    const y = cy + radius * Math.sin(angle);
    const isHi = i === highlight;
    ticks.push(
      <g key={i}>
        <circle cx={x} cy={y} r={isHi ? 14 : 9} fill={isHi ? 'var(--gold)' : 'rgba(255,255,255,0.05)'} stroke={isHi ? '#fff5d6' : 'rgba(230,184,92,0.3)'} strokeWidth="1.5"/>
        <text x={x} y={y + 4} textAnchor="middle" fontSize="11" fontFamily="JetBrains Mono" fontWeight="700" fill={isHi ? '#1a0f2e' : 'var(--parchment)'}>{i}</text>
      </g>
    );
  }
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={radius + 14} fill="none" stroke="rgba(230,184,92,0.2)" strokeWidth="1"/>
      <circle cx={cx} cy={cy} r={radius} fill="rgba(10,6,24,0.4)" stroke="rgba(230,184,92,0.4)" strokeWidth="1.5"/>
      {ticks}
      <circle cx={cx} cy={cy} r="3" fill="var(--gold)"/>
    </svg>
  );
};

        υπολόγισα <span className="font-mono">g^1 mod p</span>, <span className="font-mono">g^2 mod p</span>, ...
      </SpeechBubble>
    </div>
  );
};

// SCENE 6: Common Secret = (master_PP)^a mod p
const L2S6_CommonSecret = ({ state, setState, advance, loseLife, gainLife, edAttempts }) => {
  const [input, setInput] = useState(''), [error, setError] = useState(''), [shaking, setShaking] = useState(false);
  const correct = modPow(state.master.publicPrivate, state.player.private, state.prime);
  const submit = () => {
    const n = Number(input);
    if (n === correct) {
      setError(''); setState(s => ({ ...s, player: { ...s.player, commonSecret: n }, master: { ...s.master, commonSecret: n }, edSearching: false }));
      gainLife(); setTimeout(advance, 700);
    } else {
      setShaking(true); setError('Λάθος! Χάνεις ζωή...');
      setTimeout(() => { setShaking(false); loseLife('l2-common'); }, 900);
    }
  };
  return (
    <div className="space-y-6 fade-up">
      <AvatarsRow active={['player','master','ed']} talking={['master','ed']}/>
      <EdTracker attempts={edAttempts} mode="searching"/>
      <SpeechBubble from="master">
        Και τώρα ο <strong style={{ color: 'var(--gold)' }}>Κοινός Μυστικός</strong>:
        <span className="font-mono mx-2 px-2 py-0.5 rounded bg-white/10">(Δημ-Ιδ Master)^a mod p</span>.
      </SpeechBubble>
      <div className="speech-bubble player max-w-3xl mx-auto">
        <div className="flex items-center gap-3 flex-wrap mb-3">
          <NumberBox value={state.master.publicPrivate} type="public" label="Δημ-Ιδ Master" small/>
          <span className="text-lg" style={{ color: 'var(--gold)' }}>^</span>
          <NumberBox value={state.player.private} type="private" label="a (δικός σου)" small/>
          <span className="text-lg" style={{ color: 'var(--gold)' }}>mod</span>
          <NumberBox value={state.prime} type="public" label="p" small/>
          <span className="text-2xl" style={{ color: 'var(--gold)' }}>=</span>
          <input className={`game-input ${shaking ? 'shake' : ''}`} type="number" placeholder="?" value={input} onChange={e => setInput(e.target.value)}/>
        </div>
        <button className="game-btn mt-2" onClick={submit}>Επιβεβαίωση</button>
        {error && <div className="text-red-400 text-sm mt-3">{error}</div>}
      </div>
      <SpeechBubble from="ed">
        Δοκιμάζω ακόμα... Με μικρό p όπως εδώ, σε λίγο θα τα βρω. Αλλά με p εκατοντάδων ψηφίων, ούτε όλος ο χρόνος του σύμπαντος δεν θα έφτανε!
      </SpeechBubble>
    </div>
  );
};

/* ----- Building B scenes ----- */

// SCENE 7: New private (after drag-drop)
// SCENE 7 (Building B): Pick new private — p is not chosen yet, so use a safe range
// valid for any allowed prime. Min allowed prime is 7, so p-2 >= 5; use range [2, 5].
const L2S7_NewPrivate = ({ state, setState, advance, loseLife }) => {
  const MIN_A = 2, MAX_A = 5;
  const [input, setInput] = useState(''), [error, setError] = useState(''), [shaking, setShaking] = useState(false);
  const submit = () => {
    const n = Number(input);
    if (!Number.isInteger(n) || n < MIN_A || n > MAX_A) {
      setShaking(true); setError(`Πρέπει να είναι ακέραιος μεταξύ ${MIN_A} και ${MAX_A}.`);
      setTimeout(() => setShaking(false), 500);
      return;
    }
    setError(''); setState(s => ({ ...s, player: { ...s.player, private: n } }));
    setTimeout(advance, 500);
  };
  return (
    <div className="space-y-6 fade-up">
      <AvatarsRow active={['player','master','ed']} talking={['master']}/>
      <SpeechBubble from="master">
        Καιρός να επιλέξεις νέο <strong style={{ color: 'var(--player)' }}>Ιδιωτικό Αριθμό</strong>!
        Σε αυτό το κτήριο θα διαλέξεις εσύ μετά τη Βάση και το Μέγεθος Ρολογιού,
        οπότε για ασφάλεια κράτα τον <strong>μικρό</strong>: στο διάστημα {MIN_A}–{MAX_A}
        (έτσι θα ταιριάζει ό,τι p κι αν διαλέξεις στη συνέχεια).
      </SpeechBubble>
      <div className="grid md:grid-cols-2 gap-8 items-center">
        <div className="speech-bubble player">
          <div className="flex items-end gap-3 flex-wrap">
            <input className={`game-input ${shaking ? 'shake' : ''}`} type="number" placeholder="?" value={input} onChange={e => setInput(e.target.value)}/>
            <button className="game-btn" onClick={submit}>Επιλογή</button>
          </div>
          {error && <div className="text-red-400 text-sm mt-3">{error}</div>}
        </div>
        <div className="text-center">
          <NumberBox label="Ιδιωτικός Master" value={state.master.private} type="private" hidden peeked={false} helper="Κρυφός"/>
        </div>
      </div>
      <SpeechBubble from="ed">Δεν βλέπω κανέναν Ιδιωτικό... αλλά αυτή τη φορά έχω καλύτερα εργαλεία!</SpeechBubble>
    </div>
  );
};

// SCENE 8: Player picks base + prime
const L2S8_PlayerPicksPublic = ({ state, setState, advance, loseLife }) => {
  const [pInput, setPInput] = useState(''), [gInput, setGInput] = useState('');
  const [error, setError] = useState(''), [shaking, setShaking] = useState(false);
  const submit = () => {
    const p = Number(pInput), g = Number(gInput);
    if (!Number.isInteger(p) || !L2.PRIMES_ALLOWED.includes(p)) {
      setShaking(true); setError(`Το p πρέπει να είναι πρώτος από: ${L2.PRIMES_ALLOWED.join(', ')}.`);
      setTimeout(() => setShaking(false), 500); return;
    }
    if (!Number.isInteger(g) || g <= 1 || g >= p) {
      setShaking(true); setError(`Η Βάση g πρέπει να ικανοποιεί 1 < g < p (= ${p}).`);
      setTimeout(() => setShaking(false), 500); return;
    }
    // Also validate that existing private fits new prime
    if (state.player.private && state.player.private > p - 2) {
      setError(`Ο Ιδιωτικός σου (${state.player.private}) είναι μεγαλύτερος από p-2 = ${p-2}. Επίστρεψε και διάλεξε μικρότερο.`);
      return;
    }
    setError(''); setState(s => ({ ...s, prime: p, base: g, edSearching: true }));
    setTimeout(advance, 500);
  };
  return (
    <div className="space-y-6 fade-up">
      <AvatarsRow active={['player','master','ed']} talking={['master','ed']}/>
      <SpeechBubble from="master">
        Σειρά σου να διαλέξεις τους δύο <strong style={{ color: 'var(--gold)' }}>Δημόσιους Αριθμούς</strong>!
        Θυμήσου: το <strong>p</strong> πρώτος (επιτρεπτοί: {L2.PRIMES_ALLOWED.join(', ')}), και <span className="font-mono">1 &lt; g &lt; p</span>.
      </SpeechBubble>
      <div className="speech-bubble player max-w-3xl mx-auto">
        <div className="flex items-center gap-4 flex-wrap">
          <div className="flex flex-col items-center gap-2">
            <span className="text-xs uppercase tracking-widest text-white/50">Μέγεθος Ρολογιού p</span>
            <input className={`game-input small ${shaking ? 'shake' : ''}`} type="number" placeholder="p" value={pInput} onChange={e => setPInput(e.target.value)}/>
          </div>
          <div className="flex flex-col items-center gap-2">
            <span className="text-xs uppercase tracking-widest text-white/50">Βάση g</span>
            <input className={`game-input small ${shaking ? 'shake' : ''}`} type="number" placeholder="g" value={gInput} onChange={e => setGInput(e.target.value)}/>
          </div>
          <button className="game-btn" onClick={submit}>Επιβεβαίωση</button>
        </div>
        {error && <div className="text-red-400 text-sm mt-3">{error}</div>}
      </div>
      <SpeechBubble from="ed">Θα δοκιμάσω όλους τους δυνατούς εκθέτες μέχρι να βρω αυτόν που χρησιμοποίησες.</SpeechBubble>
    </div>
  );
};

// SCENE 9: Public-Private (same logic as scene 5 for Building B)
const L2S9_PublicPrivateB2 = L2S5_PublicPrivate;
// SCENE 10: Common Secret (same logic as scene 6)
const L2S10_CommonSecretB2 = L2S6_CommonSecret;


/* ============================== END SCREENS ============================== */
const LevelCompleteScreen = ({ levelNum, commonSecret, edAttempts, onNext }) => {

          {isFinal ? 'Παιχνίδι Ολοκληρώθηκε' : `Πίστα ${levelNum} Ολοκληρώθηκε`}

        <p className="text-xl text-white/80 mb-2">
          Εσύ και ο Master μοιράζεστε τον ίδιο Κοινό Μυστικό
        </p>
        <div className="my-8">
          <div className="inline-block speech-bubble">
            <div className="text-xs uppercase tracking-widest mb-2 text-white/60">Κοινός Μυστικός Αριθμός</div>

          </div>

        {edAttempts > 0 && (

            <p className="text-sm text-white/80 leading-relaxed">
              Ο ED έκανε <strong className="font-mono" style={{color:'var(--ed-soft)'}}>{edAttempts}</strong> δοκιμές.
              Με τόσο μικρούς αριθμούς, η εξαντλητική του αναζήτηση {isFinal ? 'θα είχε επιτύχει αν είχε λίγο ακόμα χρόνο' : 'είναι εφικτή'}.
              Σε πραγματικό σύστημα DH χρησιμοποιούμε αριθμούς με <strong>εκατοντάδες ψηφία</strong> — τότε ο ED θα χρειαζόταν δισεκατομμύρια χρόνια!

          </p>
        )}
        {isFinal && (
          <p className="text-white/70 mb-8">
            Έμαθες το πρωτόκολλο Diffie-Hellman στις δύο μορφές του: τη διαισθητική (πολλαπλασιασμός) και την πραγματική (ύψωση σε δύναμη mod p).

const GameOverScreen = ({ reason, onRestart, onMenu }) => (
  <div className="min-h-screen flex items-center justify-center px-6">

      <div className="text-7xl mb-4">💔</div>

      <h1 className="font-display text-5xl md:text-6xl font-bold mb-4 glow-ed" style={{ color: 'var(--ed)' }}>Έχασες</h1>
      <p className="text-lg text-white/70 mb-8">{reason}</p>
      <div className="flex gap-3 justify-center flex-wrap">
        <button className="game-btn" onClick={onRestart}>▸ Νέα Προσπάθεια στην ίδια Πίστα</button>

);

/* ============================== APP ============================== */
const SCENE_INFO = {
  1: {
    1: 'Επιλογή Ιδιωτικού', 2: 'Master επιλέγει Δημόσιο', 3: 'Δημόσιος-Ιδιωτικός', 4: 'Κοινός Μυστικός',
    5: 'Test σειράς + νέος Ιδιωτικός', 6: 'Επιλογή Δημόσιου', 7: 'Δημόσιος-Ιδιωτικός', 8: 'Κοινός Μυστικός',
  },
  2: {
    1: 'Αριθμητική Ρολογιού', 2: 'Ύψωση σε Δύναμη + Κανόνες', 3: 'Επιλογή Ιδιωτικού',
    4: 'Master επιλέγει g και p', 5: 'Δημόσιος-Ιδιωτικός', 6: 'Κοινός Μυστικός',
    7: 'Test σειράς + νέος Ιδιωτικός', 8: 'Επιλογή g και p', 9: 'Δημόσιος-Ιδιωτικός', 10: 'Κοινός Μυστικός',
  },
};
const L1_TOTAL = 8, L2_TOTAL = 10;

const DRAG_ORDER_L1 = [
  'Επιλογή Ιδιωτικού Αριθμού',
  'Επιλογή Δημόσιου Αριθμού',
  'Δημιουργία Δημόσιου-Ιδιωτικού Αριθμού',
  'Δημιουργία Κοινού Μυστικού Αριθμού',
];
const DRAG_ORDER_L2 = [
  'Επιλογή Ιδιωτικού Αριθμού',
  'Επιλογή Βάσης και Μεγέθους Ρολογιού',
  'Υπολογισμός Δημόσιου-Ιδιωτικού (g^a mod p)',
  'Υπολογισμός Κοινού Μυστικού ((Δημ-Ιδ άλλου)^a mod p)',
];

const initialState = () => ({
  screen: 'start',
  unlockedLevel: 1,
  level: 1,
  scene: 1,
  lives: 5,
  player: { private: null, publicPrivate: null, commonSecret: null },
  master: { private: null, publicPrivate: null, commonSecret: null },
  publicNumber: null,    // L1 B2
  prime: null,           // L2: p
  base: null,            // L2: g
  edAttempts: 0,
  edSearching: false,
  buildingsCompleted: [],
  test: null,
  buildingBStarted: false,
  dragDropAttempts: 0,
  gameOverReason: '',
});

const App = () => {
  const [state, setState] = useState(initialState);

  /* ED brute-force counter — simulates ongoing attempts. NO time pressure, just visual indicator. */
  useEffect(() => {
    if (!state.edSearching) return;
    const t = setInterval(() => setState(s => s.edSearching ? { ...s, edAttempts: s.edAttempts + 1 } : s), 350);
    return () => clearInterval(t);
  }, [state.edSearching]);

  const loseLife = useCallback((source) => {
    setState(s => {
      const newLives = s.lives - 1;
      if (newLives <= 0) {
        return { ...s, lives: 0, screen: 'game-over', edSearching: false,
          gameOverReason: 'Έχασες όλες τις ζωές σου.' };
      }
      const test = makeTestForSource(source);
      return { ...s, lives: newLives, test: { ...test, returnTo: s.screen, returnScene: s.scene } };
    });
  }, []);

  const gainLife = useCallback(() => {
    setState(s => ({ ...s, lives: Math.min(5, s.lives + 1) }));
  }, []);

  const makeTestForSource = (source) => {
    if (source === 'l1-pubpriv') {
      return { type: 'mc',
        question: 'Στην Πίστα 1, ποια πράξη χρησιμοποιούμε για να φτιάξουμε τον Δημόσιο-Ιδιωτικό;',
        options: ['Πρόσθεση Ιδιωτικού + Δημόσιου','Αφαίρεση Δημόσιου − Ιδιωτικού','Πολλαπλασιασμός Ιδιωτικού × Δημόσιου','Διαίρεση Δημόσιου ÷ Ιδιωτικού'],
        correctIndex: 2, source };
    }
    if (source === 'l1-common') {
      return { type: 'mc',
        question: 'Στην Πίστα 1, πώς υπολογίζει ο Παίκτης τον Κοινό Μυστικό;',
        options: ['Δημ-Ιδ Master + Ιδιωτικός μου','Δημ-Ιδ Master × Ιδιωτικός μου','Ιδιωτικός μου × Δημόσιος','Δημ-Ιδ Master × Δημ-Ιδ μου'],
        correctIndex: 1, source };
    }
    if (source === 'l2-pubpriv') {
      return { type: 'mc',
        question: 'Στην Πίστα 2, ποιος είναι ο τύπος του Δημόσιου-Ιδιωτικού;',
        options: ['g × a mod p','g + a mod p','g^a mod p','a^g mod p'], correctIndex: 2, source };
    }
    if (source === 'l2-common') {
      return { type: 'mc',
        question: 'Στην Πίστα 2, ποιος είναι ο τύπος του Κοινού Μυστικού;',
        options: ['(Δημ-Ιδ άλλου)^a mod p','g^a mod p','(Δημ-Ιδ άλλου) × a','(Δημ-Ιδ άλλου) + p'], correctIndex: 0, source };
    }
    if (source === 'l2-mod') {
      return { type: 'mc',
        question: 'Τι σημαίνει "x mod n";',
        options: ['Το γινόμενο x × n','Το υπόλοιπο της διαίρεσης x ÷ n','Το πηλίκο της x ÷ n','Το άθροισμα x + n'], correctIndex: 1, source };
    }
    if (source === 'l2-pow' || source === 'l2-rel') {
      return { type: 'mc',
        question: 'Στο g^a, τι είναι το g;',
        options: ['Ο Εκθέτης','Η Βάση','Το γινόμενο','Το άθροισμα'], correctIndex: 1, source };
    }
    return { type: 'mc',
      question: 'Ποιος αριθμός είναι ορατός σε όλους (και στον ED);',
      options: ['Ο Ιδιωτικός','Ο Δημόσιος','Ο Κοινός Μυστικός','Ο Ιδιωτικός του Master'],
      correctIndex: 1, source };
  };

  const onTestPass = () => setState(s => ({ ...s, test: null }));
  const onTestFail = () => setState(s => {
    const newLives = s.lives - 1;
    if (newLives <= 0) return { ...s, lives: 0, screen: 'game-over', test: null, edSearching: false,
      gameOverReason: 'Απάντησες λάθος στο test και έχασες την τελευταία σου ζωή.' };
    return { ...s, lives: newLives, test: null };
  });

  /* ----- Scene advancement ----- */
  const advanceL1 = () => setState(s => {
    if (s.scene === 4) {
      return { ...s, screen: 'map', scene: 1,
        buildingsCompleted: [...new Set([...s.buildingsCompleted, 1])] };
    }
    if (s.scene === 8) {
      return { ...s, screen: 'level-complete', edSearching: false,
        buildingsCompleted: [...new Set([...s.buildingsCompleted, 2])],
        unlockedLevel: Math.max(s.unlockedLevel, 2) };
    }
    return { ...s, scene: s.scene + 1 };
  });

  const advanceL2 = () => setState(s => {
    if (s.scene === 6) {
      return { ...s, screen: 'map', scene: 1,
        buildingsCompleted: [...new Set([...s.buildingsCompleted, 1])] };
    }
    if (s.scene === 10) {
      return { ...s, screen: 'level-complete', edSearching: false,
        buildingsCompleted: [...new Set([...s.buildingsCompleted, 2])] };
    }
    return { ...s, scene: s.scene + 1 };
  });

  /* ----- Entry points ----- */
  const enterLevel = (n) => {
    if (n === 1) {
      setState(s => ({ ...initialState(), unlockedLevel: s.unlockedLevel,
        screen: 'map', level: 1, buildingsCompleted: [] }));
    } else {
      setState(s => ({ ...initialState(), unlockedLevel: s.unlockedLevel,
        screen: 'map', level: 2, buildingsCompleted: [] }));
    }
  };

  const enterBuildingL1 = (n) => {
    if (n === 1) {
      setState(s => ({ ...s, screen: 'building1', scene: 1,
        player: { private: null, publicPrivate: null, commonSecret: null },
        master: { private: L1.MASTER_PRIV_B1, publicPrivate: null, commonSecret: null },
        edAttempts: 0, edSearching: false,
      }));
    } else {
      setState(s => ({ ...s, screen: 'building2', scene: 5, buildingBStarted: false,
        dragDropAttempts: 0,
        player: { private: null, publicPrivate: null, commonSecret: null },
        master: { private: L1.MASTER_PRIV_B2, publicPrivate: null, commonSecret: null },
        publicNumber: null, edAttempts: 0, edSearching: false,
      }));
    }
  };

  const enterBuildingL2 = (n) => {
    if (n === 1) {
      setState(s => ({ ...s, screen: 'building1', scene: 1,
        player: { private: null, publicPrivate: null, commonSecret: null },
        master: { private: L2.B1_MASTER_PRIV, publicPrivate: null, commonSecret: null },
        prime: L2.B1_PRIME, base: L2.B1_BASE,
        edAttempts: 0, edSearching: false,
      }));
    } else {
      setState(s => ({ ...s, screen: 'building2', scene: 7, buildingBStarted: false,
        dragDropAttempts: 0,
        player: { private: null, publicPrivate: null, commonSecret: null },
        master: { private: L2.B2_MASTER_PRIV, publicPrivate: null, commonSecret: null },
        prime: null, base: null, edAttempts: 0, edSearching: false,
      }));
    }
  };

  /* ----- Render ----- */
  if (state.test) {
    return <MultipleChoiceTest
      question={state.test.question} options={state.test.options}
      correctIndex={state.test.correctIndex} onPass={onTestPass} onFail={onTestFail}/>;
  }
  if (state.screen === 'start') {
    return <StartScreen onStart={() => setState(s => ({ ...s, screen: 'level-select' }))}/>;
  }
  if (state.screen === 'level-select') {
    return <LevelSelectScreen unlockedLevel={state.unlockedLevel} onSelect={enterLevel}/>;
  }
  if (state.screen === 'map') {
    const props = state.level === 1
      ? { levelTitle: 'Η Πόλη των Κωδικών', levelMotto: 'Υποθέτουμε ότι κανείς δεν ξέρει διαίρεση' }
      : { levelTitle: 'Η Πόλη της Μοδιανής', levelMotto: 'Πλέον ξέρουν όλοι διαίρεση' };
    return <MapScreen levelNum={state.level} {...props}
      buildingsCompleted={state.buildingsCompleted} lives={state.lives}
      onEnterBuilding={state.level === 1 ? enterBuildingL1 : enterBuildingL2}
      onBackToMenu={() => setState(s => ({ ...s, screen: 'level-select' }))}/>;
  }
  if (state.screen === 'level-complete') {
    const onNext = () => {
      if (state.level === 1) enterLevel(2);
      else setState(s => ({ ...s, screen: 'level-select' }));
    };
    return <LevelCompleteScreen levelNum={state.level} commonSecret={state.player.commonSecret} edAttempts={state.edAttempts} onNext={onNext}/>;
  }
  if (state.screen === 'game-over') {
    return <GameOverScreen reason={state.gameOverReason}
      onRestart={() => enterLevel(state.level)}
      onMenu={() => setState(s => ({ ...initialState(), unlockedLevel: s.unlockedLevel, screen: 'level-select' }))}/>;
  }

  /* Building screens */
  const totalScenes = state.level === 1 ? L1_TOTAL : L2_TOTAL;
  const sceneTitle = SCENE_INFO[state.level][state.scene];
  const buildingLetter = state.screen === 'building1' ? 'Α' : 'Β';
  const levelName = `Πίστα ${state.level} — Κτήριο ${buildingLetter}`;

  // Drag-drop test before Building B scenes (scene 5 in L1, scene 7 in L2)
  if (state.screen === 'building2' && !state.buildingBStarted) {
    return <DragDropTest
      key={`drag-${state.level}-${state.dragDropAttempts}`}
      correctOrder={state.level === 1 ? DRAG_ORDER_L1 : DRAG_ORDER_L2}
      title="Σύρε στη Σωστή Σειρά"
      instructions="Ποια είναι η σωστή σειρά των βημάτων του πρωτοκόλλου;"
      onPass={() => setState(s => ({ ...s, buildingBStarted: true }))}
      onFail={() => setState(s => {
        const nl = s.lives - 1;
        if (nl <= 0) return { ...s, lives: 0, screen: 'game-over',
          gameOverReason: 'Δεν θυμήθηκες τη σωστή σειρά των βημάτων.' };
        return { ...s, lives: nl, dragDropAttempts: s.dragDropAttempts + 1 };
      })}/>;
  }

  let scene = null;
  if (state.level === 1) {
    if (state.scene === 1) scene = <L1S1_PickPrivate state={state} setState={setState} advance={advanceL1}/>;
    else if (state.scene === 2) scene = <L1S2_MasterPicksPublic state={state} advance={advanceL1}/>;
    else if (state.scene === 3) scene = <L1S3_PublicPrivate state={state} setState={setState} advance={advanceL1} loseLife={loseLife}/>;
    else if (state.scene === 4) scene = <L1S4_CommonSecret state={state} setState={setState} advance={advanceL1} loseLife={loseLife} gainLife={gainLife}/>;
    else if (state.scene === 5) scene = <L1S5_NewPrivate state={state} setState={setState} advance={advanceL1}/>;
    else if (state.scene === 6) scene = <L1S6_PlayerPicksPublic state={state} setState={setState} advance={advanceL1}/>;
    else if (state.scene === 7) scene = <L1S7_PublicPrivateB2 state={state} setState={setState} advance={advanceL1} loseLife={loseLife} edAttempts={state.edAttempts}/>;
    else if (state.scene === 8) scene = <L1S8_CommonSecretB2 state={state} setState={setState} advance={advanceL1} loseLife={loseLife} gainLife={gainLife} edAttempts={state.edAttempts}/>;
  } else {
    if (state.scene === 1) scene = <L2S1_ModularArithmetic advance={advanceL2} loseLife={loseLife}/>;
    else if (state.scene === 2) scene = <L2S2_Power advance={advanceL2} loseLife={loseLife}/>;
    else if (state.scene === 3) scene = <L2S3_PickPrivate state={state} setState={setState} advance={advanceL2} loseLife={loseLife}/>;
    else if (state.scene === 4) scene = <L2S4_MasterPicksPublic state={state} advance={advanceL2}/>;
    else if (state.scene === 5) scene = <L2S5_PublicPrivate state={state} setState={setState} advance={advanceL2} loseLife={loseLife} edAttempts={state.edAttempts} edSearching={state.edSearching}/>;
    else if (state.scene === 6) scene = <L2S6_CommonSecret state={state} setState={setState} advance={advanceL2} loseLife={loseLife} gainLife={gainLife} edAttempts={state.edAttempts}/>;
    else if (state.scene === 7) scene = <L2S7_NewPrivate state={state} setState={setState} advance={advanceL2} loseLife={loseLife}/>;
    else if (state.scene === 8) scene = <L2S8_PlayerPicksPublic state={state} setState={setState} advance={advanceL2} loseLife={loseLife}/>;
    else if (state.scene === 9) scene = <L2S9_PublicPrivateB2 state={state} setState={setState} advance={advanceL2} loseLife={loseLife} edAttempts={state.edAttempts} edSearching={state.edSearching}/>;
    else if (state.scene === 10) scene = <L2S10_CommonSecretB2 state={state} setState={setState} advance={advanceL2} loseLife={loseLife} gainLife={gainLife} edAttempts={state.edAttempts}/>;
  }

  return <StageFrame lives={state.lives} levelName={levelName}
    sceneTitle={sceneTitle} sceneNum={state.scene} totalScenes={totalScenes}>
    {scene}
  </StageFrame>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
